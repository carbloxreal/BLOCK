<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BLOCK</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

/* LOGIN */

.login-box{
    width:300px;
    margin:100px auto;
    background:#1a1a1a;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#2a2a2a;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#3a3a3a;
}

/* WEBSITE */

.website{
    display:none;
}

.sidebar{
    width:200px;
    height:100vh;
    background:#151515;
    position:fixed;
    padding:20px;
}

.logo{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

.menu a{
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:white;
    background:#1f1f1f;
    padding:14px;
    border-radius:12px;
    margin-bottom:10px;
}

.menu a:hover{
    background:#2a2a2a;
}

.content{
    margin-left:240px;
    padding:40px;
}

/* PROFILE */

.profile-card{
    background:#1b1b1b;
    padding:25px;
    border-radius:15px;
    width:400px;
}

.username{
    font-size:28px;
    font-weight:bold;
}

.handle{
    color:gray;
    margin-top:5px;
}

.dots{
    background:#2a2a2a;
    border:none;
    color:white;
    width:40px;
    height:40px;
    border-radius:10px;
    cursor:pointer;
    font-size:20px;
}

.menu-popup{
    display:none;
    background:#222;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    width:200px;
}

#error{
    color:red;
    text-align:center;
    margin-top:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginPage">

    <h1>BLOCK</h1>

    <input type="text" id="signupUser" placeholder="Username">
    <input type="password" id="signupPass" placeholder="Password">

    <button onclick="signup()">Sign Up</button>

    <br><br>

    <input type="text" id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Password">

    <button onclick="login()">Login</button>

    <div id="error"></div>

</div>

<!-- WEBSITE -->
<div class="website" id="website">

    <div class="sidebar">

        <div class="logo">BLOCK</div>

        <div class="menu">
            <a href="#" onclick="showHome()">🏠 Home</a>
            <a href="#" onclick="showProfile()">👤 Profile</a>
        </div>

    </div>

    <div class="content">

        <!-- HOME -->
        <div id="homePage">
            <h1>Welcome to BLOCK</h1>
            <p>Your homepage</p>
        </div>

        <!-- PROFILE -->
        <div id="profilePage" style="display:none;">

            <div class="profile-card">

                <button class="dots" onclick="toggleMenu()">⋯</button>

                <div style="margin-top:15px;">
                    <div class="username" id="displayName"></div>
                    <div class="handle" id="handle"></div>
                </div>

                <div class="menu-popup" id="popupMenu">

                    <button onclick="editDisplayName()">
                        Edit Display Name
                    </button>

                    <button onclick="logout()">
                        Logout
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

/* DATA */
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

/* AUTO LOGIN */
if(currentUser){
    openWebsite();
}

/* SIGN UP */
function signup(){

    let username = document.getElementById("signupUser").value;
    let password = document.getElementById("signupPass").value;
    let error = document.getElementById("error");

    if(username === "" || password === ""){
        error.innerText = "Fill everything";
        return;
    }

    let taken = users.find(
        u => u.username.toLowerCase() === username.toLowerCase()
    );

    if(taken){
        error.innerText = "Username already taken";
        return;
    }

    let user = {
        username: username,
        password: password,
        displayName: username
    };

    users.push(user);

    localStorage.setItem("users", JSON.stringify(users));

    currentUser = user;
    localStorage.setItem("currentUser", JSON.stringify(currentUser));

    openWebsite();
}

/* LOGIN */
function login(){

    let username = document.getElementById("loginUser").value;
    let password = document.getElementById("loginPass").value;
    let error = document.getElementById("error");

    let user = users.find(
        u => u.username === username && u.password === password
    );

    if(!user){
        error.innerText = "Wrong username or password";
        return;
    }

    currentUser = user;
    localStorage.setItem("currentUser", JSON.stringify(currentUser));

    openWebsite();
}

/* OPEN */
function openWebsite(){
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("website").style.display = "block";
    updateProfile();
}

/* PROFILE */
function updateProfile(){
    document.getElementById("displayName").innerText = currentUser.displayName;
    document.getElementById("handle").innerText = "@" + currentUser.username;
}

/* NAV */
function showHome(){
    document.getElementById("homePage").style.display = "block";
    document.getElementById("profilePage").style.display = "none";
}

function showProfile(){
    document.getElementById("homePage").style.display = "none";
    document.getElementById("profilePage").style.display = "block";
}

/* MENU */
function toggleMenu(){
    let menu = document.getElementById("popupMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

/* EDIT NAME */
function editDisplayName(){

    let newName = prompt("New Display Name:");
    if(!newName) return;

    currentUser.displayName = newName;

    for(let i = 0; i < users.length; i++){
        if(users[i].username === currentUser.username){
            users[i] = currentUser;
            break;
        }
    }

    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("currentUser", JSON.stringify(currentUser));

    updateProfile();
    document.getElementById("popupMenu").style.display = "none";
}

/* LOGOUT */
function logout(){
    localStorage.removeItem("currentUser");
    location.reload();
}

</script>

</body>
</html>
